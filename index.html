<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annuaire Établissement</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --card: #1a1a22;
    --card-hover: #222230;
    --accent: #f97316;
    --accent2: #fb923c;
    --text: #f1f0ee;
    --muted: #888898;
    --border: #2a2a38;
    --eleve: #f97316;
    --enseignant: #22c55e;
    --personnel: #a855f7;
    --parent: #3b82f6;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    padding: 48px 32px 32px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #13131a 0%, #0f0f13 100%);
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: -80px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(249,115,22,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -2px;
    position: relative;
  }

  header h1 span { color: var(--accent); }

  header p {
    color: var(--muted);
    margin-top: 8px;
    font-size: 0.95rem;
  }

  .search-wrapper {
    padding: 32px 32px 24px;
    max-width: 700px;
    margin: 0 auto;
  }

  .search-box {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-icon {
    position: absolute;
    left: 18px;
    color: var(--muted);
    font-size: 1.1rem;
    pointer-events: none;
  }

  #search {
    width: 100%;
    padding: 16px 18px 16px 48px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 999px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(249,115,22,0.15);
  }

  #search::placeholder { color: var(--muted); }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 0 32px 24px;
    max-width: 700px;
    margin: 0 auto;
  }

  .filter-btn {
    padding: 6px 16px;
    border-radius: 999px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.82rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .filter-btn.ens.active { background: var(--enseignant); border-color: var(--enseignant); }
  .filter-btn.pers.active { background: var(--personnel); border-color: var(--personnel); }
  .filter-btn.par.active { background: var(--parent); border-color: var(--parent); }

  .stats {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 0 32px 16px;
  }

  #count { color: var(--accent); font-weight: 600; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    padding: 16px 32px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 12px 16px;
    text-align: center;
    transition: transform 0.2s, border-color 0.2s, background 0.2s;
    cursor: default;
  }

  .card:hover {
    transform: translateY(-3px);
    background: var(--card-hover);
    border-color: #3a3a50;
  }

  .avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
    font-size: 1.3rem;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    color: white;
    flex-shrink: 0;
  }

  .avatar.eleve { background: linear-gradient(135deg, #f97316, #fb923c); }
  .avatar.enseignant { background: linear-gradient(135deg, #16a34a, #22c55e); }
  .avatar.personnel { background: linear-gradient(135deg, #7c3aed, #a855f7); }
  .avatar.parent { background: linear-gradient(135deg, #1d4ed8, #3b82f6); }

  .name {
    font-size: 0.82rem;
    font-weight: 500;
    line-height: 1.3;
    word-break: break-word;
  }

  .badge {
    display: inline-block;
    margin-top: 8px;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .badge.eleve { background: rgba(249,115,22,0.15); color: var(--accent); }
  .badge.enseignant { background: rgba(34,197,94,0.15); color: #4ade80; }
  .badge.personnel { background: rgba(168,85,247,0.15); color: #c084fc; }
  .badge.parent { background: rgba(59,130,246,0.15); color: #60a5fa; }

  .sub {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 3px;
    font-style: italic;
  }

  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 64px;
    color: var(--muted);
  }

  .no-results .icon { font-size: 3rem; margin-bottom: 16px; }
  .no-results p { font-size: 1.1rem; }

  .card.hidden { display: none; }
</style>
</head>

<header>
  <h1>Annuaire <span>École</span></h1>
  <p>ent.ecollege78.fr — Recherchez un membre de l'établissement</p>

  </div>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">Tous</button>

<div class="stats">

const grid = document.getElementById('grid');
const searchInput = document.getElementById('search');
const countEl = document.getElementById('count');
const filterBtns = document.querySelectorAll('.filter-btn');

let currentFilter = 'all';

function getInitials(name) {
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name[0].toUpperCase();
}

function roleLabel(role) {
  if (role === 'enseignant') return 'Enseignant(e)';
  if (role === 'personnel') return 'Personnel';
  if (role === 'parent') return 'Parent';
  return 'Élève';
}

function renderCards(list) {
  grid.innerHTML = '';
  if (list.length === 0) {
    grid.innerHTML = `<div class="no-results"><div class="icon">🔍</div><p>Aucun résultat trouvé</p></div>`;
    countEl.textContent = 0;
    return;
  }
  countEl.textContent = list.length;
  list.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="avatar ${p.role}">${getInitials(p.name)}</div>
      <div class="name">${p.name}</div>
      <span class="badge ${p.role}">${roleLabel(p.role)}</span>
      ${p.sub ? `<div class="sub">${p.sub}</div>` : ''}
    `;
    grid.appendChild(card);
  });
}

function filter() {
  const q = searchInput.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  let result = people.filter(p => {
    const n = p.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const matchQ = n.includes(q);
    const matchF = currentFilter === 'all' || p.role === currentFilter;
    return matchQ && matchF;
  });
  renderCards(result);
}

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    filter();
  });
});

searchInput.addEventListener('input', filter);

// Initial render
filter();
</script>
